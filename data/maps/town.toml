y      = 13
action = { type = "dialogue", id = "guard_warning" }

# Transition tile — bottom-right gap leads to dungeon
[[triggers]]
x      = 18
y      = 13
action = { type = "map_transition", target_map = "dungeon", target_x = 1, target_y = 1 }
