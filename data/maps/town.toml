# Elder NPC — hidden once he's left for the dungeon
[[entities]]
id        = "elder"
x         = 8
y         = 7
condition = { flag = "elder_left", present = false }

# Guard near the dungeon entrance
[[entities]]
id = "guard"
x  = 45
y  = 25

# First visit: intro dialogue, marks the conversation done
[[triggers]]
x         = 8
y         = 7
condition = { flag = "talked_to_elder", present = false }
action    = { type = "dialogue", id = "elder_intro", then_set_flag = "talked_to_elder" }

# Second visit: follow-up dialogue
[[triggers]]
x         = 8
y         = 7
condition = { flag = "talked_to_elder", present = true }
action    = { type = "dialogue", id = "elder_followup" }

# Guard blocks with a warning
[[triggers]]
x      = 45
y      = 25
action = { type = "dialogue", id = "guard_warning" }

# Transition tile — one step east of the guard leads to the dungeon
[[triggers]]
x      = 46
y      = 25
action = { type = "map_transition", target_map = "dungeon", target_x = 2, target_y = 13 }
